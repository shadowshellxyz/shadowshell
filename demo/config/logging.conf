[loggers]
keys = root, functionMonitorDigestLogger

[handlers]
keys = fileHandler, consoleHandler, functionMonitorDigestHandler

[formatters]
keys = basic

[logger_root]
level = INFO
handlers = fileHandler, consoleHandler

[logger_functionMonitorDigestLogger]
level = INFO
handlers = functionMonitorDigestHandler, consoleHandler
qualname = functionMonitorDigestLogger

[handler_consoleHandler]
class = StreamHandler
level = INFO
formatter = basic
args = (sys.stdout,)

[handler_fileHandler]
class = FileHandler
level = INFO
formatter = basic
args = ('～/logs/shadowshell.log', 'a', 'utf-8')

[handler_functionMonitorDigestHandler]
class = FileHandler
level = INFO
formatter = basic
args = ('~/logs/function_monitor_digest.log', 'a', 'utf-8')

[formatter_basic]
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
