[loggers]
keys=root,simpleExample

[handlers]
keys=fileHandler,consoleHandler

[formatters]
keys=basic

[logger_root]
level=DEBUG
handlers=fileHandler,consoleHandler

[logger_simpleExample]
level=DEBUG
handlers=consoleHandler
qualname=simpleExample
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=basic
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=basic
args=('~/shadowshellxyz/shadowshell.log', 'a', 'utf-8')

[formatter_basic]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
